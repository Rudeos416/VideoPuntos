        * {

        :root {

        /* Header Estilo YouTube */

        .header-left {

        }

        .logo {

            font-weight: 900;
            color: var(--yt-text);
            display: flex;
            align-items: center;
            gap: 4px;
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .logo-icon {
            color: var(--yt-red);
            font-size: 1.5rem;
        }

        /* Layout de Publicidad y Contenido */
        .ad-row { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            padding: 10px 0; 
            background: rgba(0,0,0,0.2); 
        }

        .ad-label { 
            font-size: 10px; 
            color: #444; 
            text-align: center; 
            display: block; 
            width: 100%; 
            margin-bottom: 4px; 
        }

        .main-layout {
            display: flex;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            box-sizing: border-box;
            flex: 1;
        }

        /* Columnas Laterales (Skyscrapers) */
        .side-ads { 
            width: 160px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        /* Contenido Central */
        .content-center {
            flex: 1;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* Tarjeta de Autenticación Estilo YouTube */
        .auth-card {
            background: var(--yt-bg-secondary);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--yt-border);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .auth-card h2 {
            font-weight: 500;
            margin-bottom: 24px;
            font-size: 1.5rem;
        }

        .form-view { display: none; }
        .form-view.active { display: block; }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid var(--yt-border);
            background: #000;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #3ea6ff;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: #f1f1f1;
            border: none;
            border-radius: 20px;
            color: #0f0f0f;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .btn-main:hover {
            opacity: 0.9;
        }

        .switch-btn { 
            cursor: pointer; 
            color: #3ea6ff; 
            text-decoration: none; 
            font-size: 0.9rem;

        }

        .switch-btn:hover {

    <!-- SCRIPT ADICIONAL: Interceptor de formulario para backend -->
    <script>
    // URL de tu servidor en Railway
    const API_BASE = 'https://clever-charisma-production-dbdb.up.railway.app/api/trpc';

    // El resto de tu código (createMessageElement, etc.) continúa igual...

        // Crear elemento para mostrar mensajes de error/éxito
        function createMessageElement(type) {
            const div = document.createElement('div');
            div.style.cssText = `
                color: ${type === 'error' ? '#ff6b6b' : '#51cf66'};
                font-size: 0.85rem;
                margin-bottom: 12px;
                padding: 8px;
                background: ${type === 'error' ? 'rgba(255, 107, 107, 0.1)' : 'rgba(81, 207, 102, 0.1)'};
                border-radius: 4px;
                display: none;
                text-align: center;
            `;
            return div;
        }

        // Interceptar el formulario de registro
        document.addEventListener('DOMContentLoaded', function() {
            const regForm = document.querySelector('#regBox form');
            const loginForm = document.querySelector('#loginBox form');
            
            if (regForm) {
                // Crear elementos de mensaje
                const errorMsg = createMessageElement('error');
                const successMsg = createMessageElement('success');
                
                // Insertar mensajes antes del formulario
                regForm.parentNode.insertBefore(errorMsg, regForm);
                regForm.parentNode.insertBefore(successMsg, regForm);
                
                // Reemplazar el manejador del formulario
                regForm.onsubmit = async function(e) {
                    e.preventDefault();
                    
                    const username = document.getElementById('regUser').value.trim();
                    const email = document.getElementById('regEmail').value.trim();
                    const password = document.getElementById('regPass').value.trim();
                    
                    // Limpiar mensajes previos
                    errorMsg.style.display = 'none';
                    successMsg.style.display = 'none';
                    errorMsg.textContent = '';
                    successMsg.textContent = '';
                    
                    // Validación básica en cliente
                    if (!username || !email || !password) {
                        errorMsg.textContent = 'Por favor completa todos los campos';
                        errorMsg.style.display = 'block';
                        return;
                    }
                    
                    if (password.length < 6) {
                        errorMsg.textContent = 'La contraseña debe tener al menos 6 caracteres';
                        errorMsg.style.display = 'block';
                        return;
                    }
                    
                    try {
                        const button = regForm.querySelector('button');
                        const originalText = button.textContent;
                        button.disabled = true;
                        button.textContent = 'Registrando...';
                        
                        // Enviar al backend
                        const response = await fetch(`${API_BASE}/registration.register`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                json: {
                                    username: username,
                                    email: email,
                                    password: password
                                }
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.error) {
                            // Manejar error del servidor
                            if (data.error.data?.code === 'CONFLICT') {
                                errorMsg.textContent = 'Este email ya está registrado. Por favor usa otro email.';
                            } else {
                                errorMsg.textContent = data.error.message || 'Error al registrarse. Intenta de nuevo.';
                            }
                            errorMsg.style.display = 'block';
                        } else if (data.result?.data?.success) {
                            // Registro exitoso
                            successMsg.textContent = '¡Registro exitoso! Redirigiendo...';
                            successMsg.style.display = 'block';
                            
                            // Guardar datos en localStorage
                            const user = {
                                nombre: username,
                                email: email
                            };
                            localStorage.setItem('usuarioRegistrado', JSON.stringify(user));
                            
                            // Redirigir después de 2 segundos
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 2000);
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        errorMsg.textContent = 'Error de conexión. Verifica tu conexión a internet.';
                        errorMsg.style.display = 'block';
                    } finally {
                        const button = regForm.querySelector('button');
                        button.disabled = false;
                        button.textContent = 'Registrarse';
                    }
                };
            }
        });
    </script>
